<script>
  document.addEventListener('DOMContentLoaded', () => {
    const content = document.querySelector('article > .content');
    if (!content) return;

    const collapsibleLevels = new Set({{ page.collapsible_sections | jsonify }});
    const levelConfig = {
      2: ['collapsible-section', 'collapsible-section-body'],
      3: ['collapsible-subsection', 'collapsible-subsection-body'],
      4: ['collapsible-detail', 'collapsible-detail-body']
    };
    const bodySelector = Object.values(levelConfig)
      .map(([, bodyClass]) => `.${bodyClass}`)
      .join(', ');

    const wrapHeadings = (container, level, sectionClass, bodyClass) => {
      const tagName = `H${level}`;
      const headings = Array.from(container.children).filter(
        (element) => element.tagName === tagName
      );

      headings.forEach((heading) => {
        const details = document.createElement('details');
        const summary = document.createElement('summary');
        const body = document.createElement('div');

        details.className = sectionClass;
        body.className = bodyClass;

        container.insertBefore(details, heading);
        details.append(summary, body);
        summary.appendChild(heading);

        while (details.nextElementSibling) {
          const sibling = details.nextElementSibling;
          const headingMatch = sibling.tagName.match(/^H([1-6])$/);

          if (headingMatch && Number(headingMatch[1]) <= level) break;
          body.appendChild(sibling);
        }
      });
    };

    [...collapsibleLevels]
      .map(Number)
      .sort((a, b) => a - b)
      .forEach((level) => {
        const config = levelConfig[level];
        if (!config) return;

        const containers = [content, ...content.querySelectorAll(bodySelector)];
        containers.forEach((container) => {
          wrapHeadings(container, level, ...config);
        });
      });

    const revealTarget = (target) => {
      if (!target) return false;

      let section = target.closest('details');
      while (section) {
        section.open = true;
        section = section.parentElement.closest('details');
      }

      return true;
    };

    const revealHashTarget = () => {
      if (!window.location.hash) return;

      let id;
      try {
        id = decodeURIComponent(window.location.hash.slice(1));
      } catch {
        id = window.location.hash.slice(1);
      }

      const target = document.getElementById(id);
      if (!revealTarget(target)) return;
      requestAnimationFrame(() => target.scrollIntoView());
    };

    document.addEventListener('click', (event) => {
      const link = event.target.closest('a[href^="#"]');
      if (!link) return;

      let id;
      try {
        id = decodeURIComponent(link.hash.slice(1));
      } catch {
        id = link.hash.slice(1);
      }

      revealTarget(document.getElementById(id));
    });

    window.addEventListener('hashchange', revealHashTarget);
    revealHashTarget();
  });
</script>
