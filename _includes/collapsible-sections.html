<script>
  document.addEventListener('DOMContentLoaded', () => {
    const content = document.querySelector('article > .content');
    if (!content) return;

    const wrapHeadings = (container, tagName, sectionClass, bodyClass) => {
      const headings = Array.from(container.querySelectorAll(`:scope > ${tagName.toLowerCase()}`));

      headings.forEach((heading) => {
        const details = document.createElement('details');
        const summary = document.createElement('summary');
        const body = document.createElement('div');

        details.className = sectionClass;
        body.className = bodyClass;

        container.insertBefore(details, heading);
        details.append(summary, body);
        summary.appendChild(heading);

        while (details.nextElementSibling && details.nextElementSibling.tagName !== tagName) {
          body.appendChild(details.nextElementSibling);
        }
      });
    };

    wrapHeadings(content, 'H2', 'collapsible-section', 'collapsible-section-body');

    content.querySelectorAll('.collapsible-section-body').forEach((sectionBody) => {
      wrapHeadings(sectionBody, 'H3', 'collapsible-subsection', 'collapsible-subsection-body');
    });

    content.querySelectorAll('.collapsible-subsection-body').forEach((subsectionBody) => {
      wrapHeadings(subsectionBody, 'H4', 'collapsible-detail', 'collapsible-detail-body');
    });

    const revealTarget = (target) => {
      if (!target) return false;

      let section = target.closest('details');
      while (section) {
        section.open = true;
        section = section.parentElement.closest('details');
      }

      return true;
    };

    const revealHashTarget = () => {
      if (!window.location.hash) return;

      let id;
      try {
        id = decodeURIComponent(window.location.hash.slice(1));
      } catch {
        id = window.location.hash.slice(1);
      }

      const target = document.getElementById(id);
      if (!revealTarget(target)) return;
      requestAnimationFrame(() => target.scrollIntoView());
    };

    document.addEventListener('click', (event) => {
      const link = event.target.closest('a[href^="#"]');
      if (!link) return;

      let id;
      try {
        id = decodeURIComponent(link.hash.slice(1));
      } catch {
        id = link.hash.slice(1);
      }

      revealTarget(document.getElementById(id));
    });

    window.addEventListener('hashchange', revealHashTarget);
    revealHashTarget();
  });
</script>
